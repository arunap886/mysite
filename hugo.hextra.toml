baseURL = "https://pamtutorials.com/"
languageCode = "en-us"
title = "PAM Tutorials"
theme = "hextra"

enableRobotsTXT = true
enableGitInfo = false
enableEmoji = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false

[menu]
  [[menu.main]]
    name = "Documentation"
    pageRef = "/docs"
    weight = 1
  [[menu.main]]
    name = "Blog"
    pageRef = "/posts"
    weight = 2
  [[menu.main]]
    name = "About"
    pageRef = "/about"
    weight = 3
  [[menu.main]]
    identifier = "github"
    name = "GitHub"
    url = "https://github.com/arunap886/mysite"
    weight = 4
    [menu.main.params]
      icon = "github"

[params]
  description = "Comprehensive tutorials and guides for CyberArk Privileged Access Management (PAM) solutions"
  
  [params.navbar]
    displayTitle = true
    displayLogo = true
    logo = "🔐"
    width = "wide"

  [params.page]
    width = "normal"

  [params.theme]
    default = "system"
    displayToggle = true

  [params.footer]
    displayCopyright = true
    displayPoweredBy = true
    width = "normal"

  [params.displayUpdatedDate]
    enable = true
    
  [params.blog]
    list = "card"

[params.search]
  enable = true
  type = "flexsearch"

  [params.search.flexsearch]
    index = ["content", "title", "description"]
