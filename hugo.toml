baseURL = "https://pamtutorials.com/"
languageCode = "en-us"
title = "PAM Tutorials - CyberArk Privileged Access Management"
theme = "PaperMod"
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true
pygmentsUseClasses = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = true
    lineNos = true
    lineNumbersInTable = true
    noClasses = false
    style = "monokai"

[params]
  description = "Comprehensive tutorials and guides for CyberArk Privileged Access Management (PAM) solutions. Learn about Privilege Cloud, implementation, security best practices, and troubleshooting."
  author = "PAM Tutorials"
  
  defaultTheme = "auto"
  disableThemeToggle = false
  
  ShowReadingTime = true
  ShowTags = true
  ShowCategories = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  ShowShareButtons = true
  ShowRssButtonInSectionTermList = true
  ShowWordCount = true
  ShowLastMod = true
  ShowToc = true
  TocOpen = false

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  [params.cover]
    linkFullImages = true
    responsiveImages = true

  [params.label]
    text = "PAM Tutorials"
    icon = "🔐"
    iconHeight = 35

  [params.profileMode]
    enabled = false

  [params.assets]
    disableHLJS = false
    disableFingerprinting = false

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

[taxonomies]
  category = "categories"
  tag = "tags"

[[menus.main]]
  name = "Home"
  url = "/"
  weight = 1

[[menus.main]]
  name = "Categories"
  url = "/categories/"
  weight = 2

[[menus.main]]
  name = "Tags"
  url = "/tags/"
  weight = 3

[[menus.main]]
  name = "Archives"
  url = "/archives/"
  weight = 4

[[menus.main]]
  name = "Search"
  url = "/search/"
  weight = 5

[[menus.main]]
  name = "About"
  url = "/about/"
  weight = 6